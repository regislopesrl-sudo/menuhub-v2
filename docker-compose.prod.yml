services:
  postgres:
    image: postgres:16
    container_name: menuhub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sistema_delivery_futuro}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_futuro_data:/var/lib/postgresql/data
    networks:
      - menuhub_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sistema_delivery_futuro}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: menuhub_redis
    restart: unless-stopped
    volumes:
      - redis_futuro_data:/data
    networks:
      - menuhub_net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: menuhub_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3100
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
    expose:
      - '3100'
    networks:
      - menuhub_net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3100/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.menuhub.net.br/api/v1}
    container_name: menuhub_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.menuhub.net.br/api/v1}
    command: ["npx", "next", "start", "--port", "3000"]
    expose:
      - '3000'
    networks:
      - menuhub_net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_futuro_data:
  redis_futuro_data:

networks:
  menuhub_net:
