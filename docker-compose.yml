services:
  postgres:
    image: postgres:16
    container_name: sistema_delivery_futuro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sistema_delivery_futuro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - postgres_futuro_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sistema_delivery_futuro']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: sistema_delivery_futuro_redis
    restart: unless-stopped
    ports:
      - '6381:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sistema_delivery_futuro_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3100
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sistema_delivery_futuro?schema=public
      JWT_ACCESS_SECRET: dev_access_secret
      JWT_REFRESH_SECRET: dev_refresh_secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3100:3100'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3100/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sistema_delivery_futuro_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3100/api/v1
    command: ["npx", "next", "start", "--port", "3000"]
    ports:
      - '3101:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_futuro_data:
