server {
  listen 80;
  server_name api.menuhub.net.br app.menuhub.net.br admin.menuhub.net.br;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name api.menuhub.net.br;

  ssl_certificate /etc/letsencrypt/live/api.menuhub.net.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.menuhub.net.br/privkey.pem;

  location / {
    proxy_pass http://api-v2:3202;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl http2;
  server_name app.menuhub.net.br admin.menuhub.net.br;

  ssl_certificate /etc/letsencrypt/live/app.menuhub.net.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.menuhub.net.br/privkey.pem;

  location /_next/webpack-hmr {
    proxy_pass http://web-v2:3112;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  location /socket.io/ {
    proxy_pass http://api-v2:3202/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://web-v2:3112;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
